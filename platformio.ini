[platformio]
; Default example only. Use `python tools/pio_task.py ... --example ...` or the
; Pixi tasks to switch examples without editing this file.
src_dir = examples/VectorTester

lib_dir = src

[common_env_data]
build_flags =
    -Isrc
lib_deps_local =
    src/Vector

[env]
lib_ldf_mode = off
build_flags =
    ${common_env_data.build_flags}
monitor_echo = yes
monitor_eol = LF
monitor_filters =
    send_on_enter
monitor_speed = 115200
lib_deps =
    ${common_env_data.lib_deps_local}

[env:teensy40]
platform = teensy
framework = arduino
board = teensy40
upload_protocol = teensy-cli

[env:mega]
platform = atmelavr
framework = arduino
board = megaatmega2560

[env:uno]
platform = atmelavr
framework = arduino
board = uno

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
upload_protocol = picotool
